apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redis-alerts
  labels:
    role: redis
spec:
  groups:
    - name: redis.rules
      rules:
        - alert: RedisMemoryUsageHigh
          expr: (redis_memory_used_bytes / redis_memory_max_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory > 85%"
            description: "Redis memory usage is above 85% for 5m on {{ $labels.instance }}"
        - alert: RedisDown
          expr: up{job="redis-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Redis exporter down"
            description: "Redis exporter has been down for >2m"
        - alert: RedisReplicationLag
          expr: redis_instance_repl_offset - redis_instance_master_repl_offset > 1000000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis replication lag high"
            description: "Replication lag >1,000,000 for {{ $labels.instance }}"
